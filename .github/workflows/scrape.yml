name: Daily Job Scraper

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      ats:
        description: "Which ATS to scrape"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - icims
          - workday
      chunk_size:
        description: "Portals per parallel job"
        required: false
        default: "50"
      date_filter:
        description: "Which jobs to include"
        required: true
        default: "today-only"
        type: choice
        options:
          - today-only
          - all-dates

env:
  CHUNK_SIZE: ${{ github.event.inputs.chunk_size || '50' }}
  DATE_FILTER: ${{ github.event.inputs.date_filter || 'today-only' }}

jobs:
  # ============================================
  # Step 1: Prepare - count portals and create chunks
  # ============================================
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      icims_chunks: ${{ steps.chunks.outputs.icims_chunks }}
      workday_chunks: ${{ steps.chunks.outputs.workday_chunks }}
      icims_total: ${{ steps.chunks.outputs.icims_total }}
      workday_total: ${{ steps.chunks.outputs.workday_total }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Calculate chunks
        id: chunks
        run: |
          python << 'EOF'
          import json
          import math
          import os
          import yaml

          # Count portals from YAML config
          with open('config/portals.yaml') as f:
              data = yaml.safe_load(f)

          icims_count = len(data.get('icims', []))
          workday_count = len(data.get('workday', []))
          chunk_size = int(os.environ.get('CHUNK_SIZE', 50))

          icims_chunks = math.ceil(icims_count / chunk_size) if icims_count > 0 else 0
          workday_chunks = math.ceil(workday_count / chunk_size) if workday_count > 0 else 0

          # Output as JSON arrays for matrix
          icims_matrix = list(range(icims_chunks)) if icims_chunks > 0 else [0]
          workday_matrix = list(range(workday_chunks)) if workday_chunks > 0 else [0]

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"icims_chunks={json.dumps(icims_matrix)}\n")
              f.write(f"workday_chunks={json.dumps(workday_matrix)}\n")
              f.write(f"icims_total={icims_count}\n")
              f.write(f"workday_total={workday_count}\n")

          print(f"iCIMS: {icims_count} portals -> {icims_chunks} chunks")
          print(f"Workday: {workday_count} portals -> {workday_chunks} chunks")
          EOF

  # ============================================
  # Step 2: Scrape iCIMS portals in parallel
  # ============================================
  scrape-icims:
    needs: prepare
    if: ${{ github.event.inputs.ats == 'all' || github.event.inputs.ats == 'icims' || github.event.inputs.ats == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.icims_chunks) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize and seed database
        run: |
          python << 'EOF'
          from storage.database import init_db, db_session, upsert_portal
          from config.settings import DB_PATH
          import yaml

          init_db(DB_PATH)

          # Load portals from config
          with open('config/portals.yaml') as f:
              data = yaml.safe_load(f)

          with db_session(DB_PATH) as conn:
              for entry in data.get('icims', []):
                  slug = entry.get('ats_slug', '')
                  url = entry.get('url', '')
                  if slug or url:
                      subdomain = f"careers-{slug}" if slug else url
                      upsert_portal(
                          conn, subdomain=subdomain, slug=slug,
                          name=entry.get('name', ''), url=url,
                          ats_type='icims', sector=entry.get('sector', ''),
                          verified=True,
                      )
          print("Database seeded")
          EOF

      - name: Scrape iCIMS chunk ${{ matrix.chunk }}
        env:
          CHUNK: ${{ matrix.chunk }}
          CHUNK_SIZE: ${{ env.CHUNK_SIZE }}
        run: |
          OFFSET=$((CHUNK * CHUNK_SIZE))

          DATE_ARG=""
          if [ "$DATE_FILTER" = "today-only" ]; then
            DATE_ARG="--today-only"
          fi

          echo "Scraping iCIMS portals: offset=$OFFSET, limit=$CHUNK_SIZE"

          python -c "
          import sys
          sys.path.insert(0, '.')
          from storage.database import init_db, get_connection
          from config.settings import DB_PATH

          init_db(DB_PATH)
          conn = get_connection(DB_PATH)

          offset = int('$OFFSET')
          limit = int('$CHUNK_SIZE')

          rows = conn.execute('''
              SELECT subdomain, slug, name, url FROM portals
              WHERE ats_type = \"icims\" AND verified = 1
              ORDER BY id
              LIMIT ? OFFSET ?
          ''', (limit, offset)).fetchall()

          print(f'Found {len(rows)} iCIMS portals in chunk')
          for r in rows[:3]:
              print(f'  - {r[\"name\"]} ({r[\"slug\"]})')
          "

          # Run the scraper - today_only filters BEFORE detail fetch for speed
          python main.py scrape --ats icims --from-db --offset $OFFSET --limit $CHUNK_SIZE $DATE_ARG 2>&1 || true

      - name: Upload chunk database
        uses: actions/upload-artifact@v4
        with:
          name: db-icims-chunk-${{ matrix.chunk }}
          path: data/nursescraper.db
          retention-days: 1

  # ============================================
  # Step 3: Scrape Workday portals in parallel
  # ============================================
  scrape-workday:
    needs: prepare
    if: ${{ github.event.inputs.ats == 'all' || github.event.inputs.ats == 'workday' || github.event.inputs.ats == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.workday_chunks) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize and seed database
        run: |
          python << 'EOF'
          from storage.database import init_db, db_session, upsert_portal
          from config.settings import DB_PATH
          import yaml

          init_db(DB_PATH)

          with open('config/portals.yaml') as f:
              data = yaml.safe_load(f)

          with db_session(DB_PATH) as conn:
              for entry in data.get('workday', []):
                  url = entry.get('url', '')
                  if url:
                      upsert_portal(
                          conn, subdomain=url, slug=entry.get('slug', ''),
                          name=entry.get('name', ''), url=url,
                          ats_type='workday', sector=entry.get('sector', ''),
                          verified=True,
                      )
          print("Database seeded")
          EOF

      - name: Scrape Workday chunk ${{ matrix.chunk }}
        env:
          CHUNK: ${{ matrix.chunk }}
          CHUNK_SIZE: ${{ env.CHUNK_SIZE }}
        run: |
          OFFSET=$((CHUNK * CHUNK_SIZE))

          DATE_ARG=""
          if [ "$DATE_FILTER" = "today-only" ]; then
            DATE_ARG="--today-only"
          fi

          echo "Scraping Workday portals: offset=$OFFSET, limit=$CHUNK_SIZE"
          # Run the scraper - today_only filters BEFORE detail fetch for speed
          python main.py scrape --ats workday --from-db --offset $OFFSET --limit $CHUNK_SIZE $DATE_ARG 2>&1 || true

      - name: Upload chunk database
        uses: actions/upload-artifact@v4
        with:
          name: db-workday-chunk-${{ matrix.chunk }}
          path: data/nursescraper.db
          retention-days: 1

  # ============================================
  # Step 3: Scrape TalentBrew, Taleo, Oracle portals (few portals, no chunking needed)
  # ============================================
  scrape-other:
    needs: prepare
    if: ${{ github.event.inputs.ats == 'all' || github.event.inputs.ats == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize and seed database
        run: |
          python << 'EOF'
          from storage.database import init_db, db_session, upsert_portal
          from config.settings import DB_PATH
          from urllib.parse import urlparse
          import yaml

          init_db(DB_PATH)

          with open('config/portals.yaml') as f:
              data = yaml.safe_load(f)

          with db_session(DB_PATH) as conn:
              for ats_type in ('talentbrew', 'taleo', 'oracle'):
                  for entry in data.get(ats_type, []):
                      url = entry.get('url', '')
                      if not url:
                          continue
                      slug = entry.get('slug', '')
                      if not slug:
                          hostname = urlparse(url).hostname or ''
                          slug = hostname.replace('careers.', '').replace('.org', '').replace('.com', '').replace('.', '-')
                      upsert_portal(
                          conn, subdomain=slug, slug=slug,
                          name=entry.get('name', slug), url=url,
                          ats_type=ats_type, sector=entry.get('sector', ''),
                          verified=True,
                      )
          print("Database seeded with TalentBrew/Taleo/Oracle portals")
          EOF

      - name: Scrape TalentBrew portals
        run: |
          DATE_ARG=""
          if [ "$DATE_FILTER" = "today-only" ]; then
            DATE_ARG="--today-only"
          fi
          python main.py scrape --ats talentbrew --from-db $DATE_ARG 2>&1 || true

      - name: Scrape Taleo portals
        run: |
          DATE_ARG=""
          if [ "$DATE_FILTER" = "today-only" ]; then
            DATE_ARG="--today-only"
          fi
          python main.py scrape --ats taleo --from-db $DATE_ARG 2>&1 || true

      - name: Scrape Oracle portals
        run: |
          DATE_ARG=""
          if [ "$DATE_FILTER" = "today-only" ]; then
            DATE_ARG="--today-only"
          fi
          python main.py scrape --ats oracle --from-db $DATE_ARG 2>&1 || true

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: db-other
          path: data/nursescraper.db
          retention-days: 1

  # ============================================
  # Step 4: Merge all databases and generate feeds
  # ============================================
  merge-and-publish:
    needs: [prepare, scrape-icims, scrape-workday, scrape-other]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge databases
        run: |
          python << 'EOF'
          import sqlite3
          import os
          from pathlib import Path
          from storage.database import init_db
          from config.settings import DB_PATH

          # Initialize main database
          init_db(DB_PATH)
          main_conn = sqlite3.connect(DB_PATH)
          main_conn.row_factory = sqlite3.Row

          artifacts_dir = Path("artifacts")
          merged_jobs = 0

          for db_dir in artifacts_dir.glob("db-*"):
              db_file = db_dir / "nursescraper.db"
              if not db_file.exists():
                  continue

              print(f"Merging {db_dir.name}...")
              chunk_conn = sqlite3.connect(str(db_file))
              chunk_conn.row_factory = sqlite3.Row

              # Copy jobs from chunk to main
              jobs = chunk_conn.execute("SELECT * FROM jobs").fetchall()
              for job in jobs:
                  try:
                      main_conn.execute('''
                          INSERT OR REPLACE INTO jobs
                          (portal_id, external_id, title, department, location,
                           state, city, job_type, salary_min, salary_max,
                           posted_date, url, description, qualifications,
                           scraped_at, unique_key)
                          VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
                      ''', (
                          job['portal_id'], job['external_id'], job['title'],
                          job['department'], job['location'], job['state'],
                          job['city'], job['job_type'], job['salary_min'],
                          job['salary_max'], job['posted_date'], job['url'],
                          job['description'], job['qualifications'],
                          job['scraped_at'], job['unique_key']
                      ))
                      merged_jobs += 1
                  except Exception as e:
                      print(f"  Error merging job: {e}")

              chunk_conn.close()

          main_conn.commit()
          main_conn.close()

          print(f"\nMerged {merged_jobs} jobs into main database")
          EOF

      - name: Generate feeds
        run: python feed_generator.py

      - name: Show status
        run: python pipeline.py status

      - name: Export jobs to JSON
        id: export
        run: |
          python << 'EOF'
          import sqlite3
          import json
          from datetime import datetime
          from pathlib import Path

          db_path = Path("data/nursescraper.db")
          conn = sqlite3.connect(str(db_path))
          conn.row_factory = sqlite3.Row

          # Get all jobs with portal info
          jobs = conn.execute('''
              SELECT
                  j.id, j.external_id, j.title, j.department, j.location,
                  j.state, j.city, j.job_type, j.salary_min, j.salary_max,
                  j.posted_date, j.url, j.description, j.qualifications,
                  j.scraped_at,
                  p.name as company_name, p.ats_type, p.sector
              FROM jobs j
              LEFT JOIN portals p ON j.portal_id = p.id
              ORDER BY j.posted_date DESC, j.scraped_at DESC
          ''').fetchall()

          # Get portal stats
          portals = conn.execute('''
              SELECT ats_type, COUNT(*) as count
              FROM portals WHERE verified = 1
              GROUP BY ats_type
          ''').fetchall()

          conn.close()

          # Build export data
          export_data = {
              "metadata": {
                  "exported_at": datetime.utcnow().isoformat() + "Z",
                  "total_jobs": len(jobs),
                  "portals": {r["ats_type"]: r["count"] for r in portals},
              },
              "jobs": [dict(row) for row in jobs]
          }

          # Write full export
          output_path = Path("data/jobs-export.json")
          with open(output_path, "w") as f:
              json.dump(export_data, f, indent=2, default=str)

          print(f"Exported {len(jobs)} jobs to {output_path}")

          # Write compact version (no descriptions, smaller file)
          compact_jobs = []
          for row in jobs:
              compact_jobs.append({
                  "id": row["id"],
                  "external_id": row["external_id"],
                  "title": row["title"],
                  "company": row["company_name"],
                  "location": row["location"],
                  "state": row["state"],
                  "city": row["city"],
                  "job_type": row["job_type"],
                  "salary_min": row["salary_min"],
                  "salary_max": row["salary_max"],
                  "posted_date": row["posted_date"],
                  "url": row["url"],
                  "ats_type": row["ats_type"],
                  "sector": row["sector"],
              })

          compact_data = {
              "metadata": export_data["metadata"],
              "jobs": compact_jobs
          }

          compact_path = Path("data/jobs-compact.json")
          with open(compact_path, "w") as f:
              json.dump(compact_data, f, separators=(',', ':'))

          print(f"Exported compact version to {compact_path}")

          # Output stats for release notes
          with open("release_stats.txt", "w") as f:
              f.write(f"TOTAL_JOBS={len(jobs)}\n")
              for ats, count in export_data["metadata"]["portals"].items():
                  f.write(f"PORTALS_{ats.upper()}={count}\n")
          EOF

      - name: Upload final database
        uses: actions/upload-artifact@v4
        with:
          name: jobscraper-data-${{ github.run_number }}
          path: |
            data/nursescraper.db
            data/feeds/
            data/jobs-export.json
            data/jobs-compact.json
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="data-${DATE}-${{ github.run_number }}"

          # Get job count for release notes
          TOTAL_JOBS=$(grep TOTAL_JOBS release_stats.txt | cut -d= -f2)

          # Create release notes
          cat > release_notes.md << EOF
          ## Daily Job Scrape - ${DATE}

          **Total Jobs:** ${TOTAL_JOBS}

          ### Files
          - \`jobs-export.json\` - Full export with descriptions (~large)
          - \`jobs-compact.json\` - Compact export without descriptions (~small)
          - \`nursescraper.db\` - SQLite database

          ### Usage
          \`\`\`bash
          # Download latest compact JSON
          curl -L -o jobs.json \\
            https://github.com/${{ github.repository }}/releases/latest/download/jobs-compact.json
          \`\`\`
          EOF

          # Create release with assets
          gh release create "$TAG" \
            --title "Jobs Data - ${DATE}" \
            --notes-file release_notes.md \
            data/jobs-export.json \
            data/jobs-compact.json \
            data/nursescraper.db

      - name: Commit to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/nursescraper.db data/feeds/
          git diff --staged --quiet || git commit -m "chore: daily scrape $(date -u +%Y-%m-%d) [skip ci]"
          git push
